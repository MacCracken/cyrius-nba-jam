[project]
name = "cyrius-nba-jam"
version = "0.1.0"
description = "NBA Jam reimplementation in Cyrius — 2D arcade basketball"
license = "GPL-3.0-only"
repository = "https://github.com/MacCracken/cyrius-nba-jam"

[deps]
stdlib = ["string", "fmt", "alloc", "io", "args", "assert"]
# sakshi — structured logging (when available)

[build]
src = "src/main.cyr"
out = "build/nba-jam"

[toolchain]
min = "4.8.5"
